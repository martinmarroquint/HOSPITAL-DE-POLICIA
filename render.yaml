cat > render.yaml << 'EOF'
services:
  - type: web
    name: hospital-policia-backend
    runtime: python
    repo: https://github.com/martinmarroquint/HOSPITAL-DE-POLICIA.git
    branch: master
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: sh startup.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: PORT
        value: 8000
      - key: SECRET_KEY
        generateValue: true
      - key: SUPABASE_DATABASE_URL
        sync: false
      - key: SUPABASE_DB_HOST
        sync: false
      - key: SUPABASE_DB_PORT
        value: 5432
      - key: SUPABASE_DB_NAME
        sync: false
      - key: SUPABASE_DB_USER
        sync: false
      - key: SUPABASE_DB_PASSWORD
        sync: false
EOF